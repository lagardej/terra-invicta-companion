<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Savefile Processing Log — Terra Invicta Companion</title>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: ui-monospace, "Cascadia Code", "Fira Mono", monospace;
      background: #0d0f14;
      color: #c9d1d9;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 1.5rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .empty {
      color: #484f58;
      font-size: 0.875rem;
      padding: 2rem 0.75rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8125rem;
    }

    thead th {
      text-align: left;
      padding: 0.5rem 0.75rem;
      color: #8b949e;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 0.6875rem;
      border-bottom: 1px solid #21262d;
    }

    tbody tr {
      border-bottom: 1px solid #161b22;
      transition: background 0.1s;
    }

    tbody tr:hover {
      background: #161b22;
    }

    td {
      padding: 0.5rem 0.75rem;
      vertical-align: middle;
      white-space: nowrap;
    }

    .status {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .status-succeeded {
      background: #0d3622;
      color: #3fb950;
    }

    .status-failed {
      background: #3d1212;
      color: #f85149;
    }

    .reason {
      color: #8b949e;
      font-size: 0.75rem;
      max-width: 28rem;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dim { color: #484f58; }

    .duration { color: #8b949e; }
  </style>
</head>
<body>
  <h1>Savefile Processing Log</h1>

  <table>
    <thead>
      <tr>
        <th>Status</th>
        <th>Game date</th>
        <th>Faction</th>
        <th>Campaign start</th>
        <th>Duration</th>
        <th>Reason</th>
        <th>Recorded at</th>
      </tr>
    </thead>
    <tbody
      hx-get="/savefiles/table"
      hx-trigger="load, every 5s"
      hx-swap="innerHTML"
    >
      {% include "savefiles/list/_table.html" %}
    </tbody>
  </table>
</body>
</html>
