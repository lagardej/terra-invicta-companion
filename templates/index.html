<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terra Invicta Companion</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: ui-monospace, "Cascadia Code", "Fira Mono", monospace;
      background: #0d0f14;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #e6edf3;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #484f58;
      font-size: 0.8125rem;
      margin-bottom: 3rem;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 20rem;
    }

    a.nav-link {
      display: block;
      padding: 0.75rem 1rem;
      border: 1px solid #21262d;
      border-radius: 4px;
      color: #c9d1d9;
      text-decoration: none;
      font-size: 0.875rem;
      transition: border-color 0.1s, background 0.1s;
    }

    a.nav-link:hover {
      border-color: #388bfd;
      background: #161b22;
      color: #e6edf3;
    }

    .nav-link-label {
      display: block;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 0.75rem;
      color: #8b949e;
      margin-bottom: 0.2rem;
    }
  </style>
</head>
<body>
  <h1>Terra Invicta Companion</h1>
  <p class="subtitle">Savefile analysis &amp; monitoring</p>

  <nav>
    <a class="nav-link" href="/savefiles/">
      <span class="nav-link-label">Savefiles</span>
      Processing log
    </a>
  </nav>
</body>
</html>
